---
deployment:
  tasks:
    - export REPOPATH=$PWD
    - export DEPLOYPATH=/home/elitesi8c1n5/public_html/www
    - /bin/mkdir -p "$DEPLOYPATH"
    - /bin/mkdir -p "$DEPLOYPATH/.data"
    - /bin/mkdir -p "$DEPLOYPATH/tmp"
    - test -f "$REPOPATH/cpanel-git-deploy.tar.gz" || { echo "Missing cpanel-git-deploy.tar.gz. Run npm run build:cpanel and commit the updated archive before deploying."; exit 1; }
    - /usr/bin/find "$DEPLOYPATH" -mindepth 1 -maxdepth 1 ! -name '.data' ! -name 'tmp' -exec /bin/rm -rf {} +
    - /usr/bin/tar -xzf "$REPOPATH/cpanel-git-deploy.tar.gz" -C "$DEPLOYPATH"
    - /usr/bin/touch "$DEPLOYPATH/tmp/restart.txt"
